# Pre-commit hooks. The project dogfoods its own anti-slop linter on its docs:
# the same rules we enforce on manuscripts are enforced on this repository's
# prose. See docs/DESIGN_PHILOSOPHY.md (pillar 8: Dogfooding).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: pwa-slop-dogfood
        name: paper-writing-agent anti-slop linter (dogfood on docs)
        entry: python -m paper_writing_agent.cli lint
        language: system
        pass_filenames: false
        # Lint the project's own prose with its own rules (pillar 8). This is a
        # hard gate: the project must pass the standard it enforces on others.
        args: ["docs/", "README.md", "CONTRIBUTING.md", "plugin/"]
        files: \.(md)$

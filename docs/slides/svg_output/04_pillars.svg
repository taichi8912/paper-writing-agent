<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="14" height="720" fill="#2563EB"/>
  <text x="100" y="92" font-size="38" font-weight="bold" fill="#0F172A">Eight design pillars</text>
  <rect x="100" y="112" width="1080" height="2" fill="#E2E8F0"/>

  <!-- row 1 -->
  <rect x="100" y="150" width="520" height="112" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="118" y="170" width="34" height="34" rx="6" fill="#2563EB"/>
  <text x="135" y="194" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="170" y="192" font-size="23" font-weight="bold" fill="#0F172A">Evidence grounding</text>
  <text x="170" y="228" font-size="18" fill="#475569">Every claim resolves to a source.</text>

  <rect x="660" y="150" width="520" height="112" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="678" y="170" width="34" height="34" rx="6" fill="#2563EB"/>
  <text x="695" y="194" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="730" y="192" font-size="23" font-weight="bold" fill="#0F172A">Anti-AI-slop</text>
  <text x="730" y="228" font-size="18" fill="#475569">Remove fingerprints; precise register.</text>

  <!-- row 2 -->
  <rect x="100" y="276" width="520" height="112" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="118" y="296" width="34" height="34" rx="6" fill="#2563EB"/>
  <text x="135" y="320" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="170" y="318" font-size="23" font-weight="bold" fill="#0F172A">Statistical honesty</text>
  <text x="170" y="354" font-size="18" fill="#475569">Significance needs a test and a verdict.</text>

  <rect x="660" y="276" width="520" height="112" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="678" y="296" width="34" height="34" rx="6" fill="#2563EB"/>
  <text x="695" y="320" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="730" y="318" font-size="23" font-weight="bold" fill="#0F172A">Single source of truth</text>
  <text x="730" y="354" font-size="18" fill="#475569">One owner per rule and per state.</text>

  <!-- row 3 -->
  <rect x="100" y="402" width="520" height="112" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="118" y="422" width="34" height="34" rx="6" fill="#2563EB"/>
  <text x="135" y="446" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="170" y="444" font-size="23" font-weight="bold" fill="#0F172A">Plan, confirm, execute</text>
  <text x="170" y="480" font-size="18" fill="#475569">Verify after. The user decides.</text>

  <rect x="660" y="402" width="520" height="112" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="678" y="422" width="34" height="34" rx="6" fill="#2563EB"/>
  <text x="695" y="446" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="730" y="444" font-size="23" font-weight="bold" fill="#0F172A">Reproducibility</text>
  <text x="730" y="480" font-size="18" fill="#475569">Re-runnable stats; auditable changes.</text>

  <!-- row 4 -->
  <rect x="100" y="528" width="520" height="112" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="118" y="548" width="34" height="34" rx="6" fill="#2563EB"/>
  <text x="135" y="572" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">7</text>
  <text x="170" y="570" font-size="23" font-weight="bold" fill="#0F172A">Configurable, not rigid</text>
  <text x="170" y="606" font-size="18" fill="#475569">Venue, style, strictness are settings.</text>

  <rect x="660" y="528" width="520" height="112" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="678" y="548" width="34" height="34" rx="6" fill="#059669"/>
  <text x="695" y="572" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">8</text>
  <text x="730" y="570" font-size="23" font-weight="bold" fill="#0F172A">Dogfooding</text>
  <text x="730" y="606" font-size="18" fill="#475569">The project lints its own prose.</text>

  <text x="100" y="692" font-size="16" fill="#94A3B8">github.com/taichi8912/paper-writing-agent</text>
  <text x="1180" y="692" font-size="16" fill="#94A3B8" text-anchor="end">4 / 9</text>
</svg>

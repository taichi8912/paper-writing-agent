<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="14" height="720" fill="#2563EB"/>
  <text x="100" y="92" font-size="38" font-weight="bold" fill="#0F172A">Technical core II: honesty and grounding</text>
  <rect x="100" y="112" width="1080" height="2" fill="#E2E8F0"/>

  <!-- left panel: statistical honesty -->
  <rect x="100" y="150" width="520" height="490" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="128" y="196" font-size="26" font-weight="bold" fill="#0F172A">Statistical honesty</text>

  <circle cx="140" cy="244" r="6" fill="#2563EB"/>
  <text x="160" y="251" font-size="19" fill="#334155">Every P-value needs an explicit verdict</text>
  <circle cx="140" cy="288" r="6" fill="#2563EB"/>
  <text x="160" y="295" font-size="19" fill="#334155">Name a statistical test once, at first use</text>
  <circle cx="140" cy="332" r="6" fill="#2563EB"/>
  <text x="160" y="339" font-size="19" fill="#334155">Notation follows the house style</text>

  <rect x="128" y="372" width="464" height="86" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="148" y="404" font-size="18" font-weight="bold" fill="#065F46">Accepted</text>
  <text x="148" y="436" font-size="19" fill="#065F46">significant (P = 2.6 &#215; 10&#8315;&#8309;; Welch's t-test)</text>

  <rect x="128" y="470" width="464" height="86" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="148" y="502" font-size="18" font-weight="bold" fill="#991B1B">Flagged</text>
  <text x="148" y="534" font-size="19" fill="#7F1D1D">"... higher than B (P = 0.01)." (no verdict)</text>

  <text x="128" y="600" font-size="19" fill="#1E40AF" font-weight="bold">pwa stats &lt;paths&gt;</text>

  <!-- right panel: citation grounding -->
  <rect x="660" y="150" width="520" height="490" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="688" y="196" font-size="26" font-weight="bold" fill="#0F172A">Citation grounding</text>

  <circle cx="700" cy="244" r="6" fill="#2563EB"/>
  <text x="720" y="251" font-size="19" fill="#334155">BibTeX becomes a searchable context index</text>
  <circle cx="700" cy="288" r="6" fill="#2563EB"/>
  <text x="720" y="295" font-size="19" fill="#334155">JSON-Schema anti-hallucination gates</text>
  <circle cx="700" cy="332" r="6" fill="#2563EB"/>
  <text x="720" y="339" font-size="19" fill="#334155">Coverage, no placeholders, no slop in prose</text>
  <circle cx="700" cy="376" r="6" fill="#059669"/>
  <text x="720" y="383" font-size="19" fill="#334155">Ground keys in real prior usage (verified)</text>

  <rect x="688" y="412" width="464" height="86" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="708" y="444" font-size="18" font-weight="bold" fill="#991B1B">Never invent a key</text>
  <text x="708" y="476" font-size="19" fill="#7F1D1D">If none fits: leave % TODO: cite -- &lt;claim&gt;</text>

  <text x="688" y="600" font-size="19" fill="#1E40AF" font-weight="bold">pwa bib build / validate / ground</text>

  <text x="100" y="692" font-size="16" fill="#94A3B8">github.com/taichi8912/paper-writing-agent</text>
  <text x="1180" y="692" font-size="16" fill="#94A3B8" text-anchor="end">6 / 9</text>
</svg>

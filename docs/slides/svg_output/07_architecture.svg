<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="DejaVu Sans, Arial, sans-serif">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="14" height="720" fill="#2563EB"/>
  <text x="100" y="92" font-size="38" font-weight="bold" fill="#0F172A">Architecture: a hybrid you can verify</text>
  <rect x="100" y="112" width="1080" height="2" fill="#E2E8F0"/>
  <text x="100" y="150" font-size="21" fill="#64748B">The plugin orchestrates; the core decides. The rules are unit-tested.</text>

  <!-- plugin box -->
  <rect x="200" y="180" width="880" height="150" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="230" y="218" font-size="24" font-weight="bold" fill="#1E40AF">Claude Code plugin (agentic layer)</text>
  <rect x="230" y="244" width="190" height="44" rx="8" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="325" y="272" font-size="19" fill="#1E40AF" text-anchor="middle">skills</text>
  <rect x="440" y="244" width="190" height="44" rx="8" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="535" y="272" font-size="19" fill="#1E40AF" text-anchor="middle">commands</text>
  <rect x="650" y="244" width="190" height="44" rx="8" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="745" y="272" font-size="19" fill="#1E40AF" text-anchor="middle">agents</text>
  <rect x="860" y="244" width="190" height="44" rx="8" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="955" y="272" font-size="19" fill="#1E40AF" text-anchor="middle">knowledge</text>

  <!-- arrow -->
  <line x1="640" y1="330" x2="640" y2="398" stroke="#475569" stroke-width="3"/>
  <polygon points="640,410 632,394 648,394" fill="#475569"/>
  <text x="660" y="372" font-size="19" fill="#475569">calls the core for every check</text>

  <!-- core box -->
  <rect x="200" y="410" width="880" height="170" rx="12" fill="#0F172A"/>
  <text x="230" y="450" font-size="24" font-weight="bold" fill="#93C5FD">Python core (deterministic, unit-tested)</text>
  <rect x="230" y="478" width="128" height="46" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="294" y="507" font-size="18" fill="#E2E8F0" text-anchor="middle">lint</text>
  <rect x="369" y="478" width="128" height="46" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="433" y="507" font-size="18" fill="#E2E8F0" text-anchor="middle">stats</text>
  <rect x="508" y="478" width="128" height="46" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="572" y="507" font-size="18" fill="#E2E8F0" text-anchor="middle">defs</text>
  <rect x="647" y="478" width="128" height="46" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="711" y="507" font-size="18" fill="#E2E8F0" text-anchor="middle">bib</text>
  <rect x="786" y="478" width="128" height="46" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="850" y="507" font-size="18" fill="#E2E8F0" text-anchor="middle">sections</text>
  <rect x="925" y="478" width="128" height="46" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="989" y="507" font-size="18" fill="#E2E8F0" text-anchor="middle">check</text>
  <text x="230" y="558" font-size="18" fill="#94A3B8">One shared finding/report format across linters; no editor dependency.</text>

  <text x="100" y="628" font-size="20" fill="#334155">Dogfooding: the repository lints its own prose with its own linter, in pre-commit and CI.</text>

  <text x="100" y="692" font-size="16" fill="#94A3B8">github.com/taichi8912/paper-writing-agent</text>
  <text x="1180" y="692" font-size="16" fill="#94A3B8" text-anchor="end">7 / 9</text>
</svg>
